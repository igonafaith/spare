<!-- JS -->
<!-- toc-js.html — Auto-generate Table of Contents from h2/h3/h4 in .post-body
     Pair with: toc-css.html. Only activates on posts with >= 3 headings. -->
<script>
(function(){
  // Note: heading-anchor-js.html defines an identical slug() and assigns h.id values.
  // Load heading-anchor BEFORE toc so h.id is already set when TOC reads headings.
  var slug = (window.__h && window.__h.slug) || function(text){
    return String(text).toLowerCase()
      .replace(/[^\w\s-]/g,'')
      .trim()
      .replace(/\s+/g,'-')
      .substring(0,60);
  };
  var escAttr = (window.__h && window.__h.escHtml) || function(s){
    return String(s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});
  };
  function headingText(h){
    var clone = h.cloneNode(true);
    clone.querySelectorAll('.h-anchor').forEach(function(a){ a.remove(); });
    return clone.textContent.trim();
  }
  function init(){
    var body = document.querySelector('.post-body');
    if(!body) return;
    var hs = body.querySelectorAll('h2, h3, h4');
    if(hs.length < 3) return;

    var seen = {};
    var items = [];
    hs.forEach(function(h){
      var text = headingText(h);
      var base = h.id || slug(text);
      if(!base) return;
      var id = base, n = 1;
      while(seen[id]) id = base + '-' + (++n);
      seen[id] = true;
      h.id = id;
      items.push({id:id, text:text, level:h.tagName.toLowerCase()});
    });
    if(!items.length) return;

    var details = document.createElement('details');
    details.className = 'toc-box';
    details.open = true;
    var html = '<summary>Daftar Isi</summary><ul>';
    items.forEach(function(it){
      html += '<li class="toc-' + it.level + '"><a href="#' + escAttr(it.id) + '">' + escAttr(it.text) + '</a></li>';
    });
    html += '</ul>';
    details.innerHTML = html;

    var firstP = body.querySelector('p');
    if(firstP && firstP.parentNode === body) body.insertBefore(details, firstP.nextSibling);
    else body.insertBefore(details, body.firstChild);

    if('IntersectionObserver' in window){
      var links = {};
      details.querySelectorAll('a').forEach(function(a){
        links[a.getAttribute('href').slice(1)] = a;
      });
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(e){
          var a = links[e.target.id];
          if(!a) return;
          if(e.isIntersecting){
            Object.keys(links).forEach(function(k){ links[k].classList.remove('active'); });
            a.classList.add('active');
          }
        });
      }, {rootMargin:'-20% 0px -70% 0px'});
      hs.forEach(function(h){ if(h.id) io.observe(h); });
    }
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>
